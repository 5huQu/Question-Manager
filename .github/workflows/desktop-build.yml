name: Desktop Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional release tag to publish, for example v0.1.0'
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            artifact: Question-Manager-macOS
            package_command: npm run pack:desktop
            package_path: dist/Question-Manager-macOS-*.zip
          - name: Windows
            os: windows-latest
            artifact: Question-Manager-Windows-Installer
            package_command: npm run pack:windows-installer
            package_path: dist/Question-Manager-Setup-*.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Restore Python runtime download cache
        uses: actions/cache@v5
        with:
          path: runtime/cache
          key: python-runtime-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('server/python/runtime-requirements.txt', 'scripts/prepare-python-runtime.mjs') }}

      - name: Install dependencies
        run: npm ci

      - name: Run math rendering tests
        run: npm run test:math-render

      - name: Build application
        run: npm run build

      - name: Run API smoke test
        run: npm run test:smoke

      - name: Package and verify desktop application
        run: ${{ matrix.package_command }}

      - name: Create macOS archive
        if: runner.os == 'macOS'
        shell: bash
        run: |
          app_path="$(find dist -maxdepth 3 -type d -name 'Question Manager.app' -print -quit)"
          test -n "$app_path"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "dist/${{ matrix.artifact }}-${{ runner.arch }}.zip"

      - name: Upload desktop package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}-${{ runner.arch }}
          path: ${{ matrix.package_path }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v') || inputs.release_tag != ''
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download desktop packages
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          gh release create "$RELEASE_TAG" release-artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Question Manager $RELEASE_TAG" \
            --generate-notes
